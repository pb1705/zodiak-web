version: '3.8'

# Production Docker Compose using pre-built image from registry
# Update IMAGE_NAME below with your Docker Hub or GHCR image name
# Example: your-username/zodiak-website:latest
# Example: ghcr.io/your-username/zodiak-website:latest

services:
  nextjs:
    # UPDATE THIS with your image name from Docker Hub or GHCR
    image: ${DOCKER_IMAGE:-prranav1705/zodiak-website:latest}
    container_name: zodiak-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://zodiak.life}
      - PORT=3000
    # IMPORTANT: Do NOT expose port 3000 to host (Grafana uses it)
    # Next.js is only accessible via Docker network through Nginx
    # ports:
    #   - "3000:3000"  # REMOVED - conflicts with Grafana
    networks:
      - zodiak-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: zodiak-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - nextjs
    networks:
      - zodiak-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zodiak-network:
    driver: bridge
